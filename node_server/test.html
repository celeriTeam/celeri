<!DOCTYPE html>
<html>
<head>
    <title>API Endpoints</title>
</head>
<body>
    <br>
    <h1>API Endpoints</h1>
    <br><br>
    <h2>Competitions</h2>
    <button id="start-competition-button">Start Competition</button>
    <br><br>
    <text id="start-competition-container"></text>
    <br><br>
    <button id="current-competition-button">Fetch Current Competition</button>
    <br><br>
    <text id="current-competition-container"></text>
    <br><br>
    <button id="all-competitions-button">Fetch All Competition</button>
    <br><br>
    <text id="all-competitions-container"></text>
    <br><br>
    <button id="end-competition-button">End Competition</button>
    <br><br>
    <text id="end-competition-container"></text>
    <br><br>
    <br><br>
    <h2>Competition Steps</h2>
    <input type="text" id="user-id-input" placeholder="Enter User ID">
    <button id="add-user-button">Add User</button>
    <br><br>
    <input type="text" id="user-id-input-2" placeholder="Enter User ID">
    <input type="text" id="user-steps-input" placeholder="Enter User ID">
    <button id="add-steps-button">Add Steps</button>
    <br><br>
    <button id="fetch-data-button">Fetch Data</button>
    <br><br>
    <text id="data-container"></text>
    <br><br>
    <text>Info for user: </text>
    <input type="text" id="user-id-info" placeholder="Enter User ID">
    <button id="fetch-user-info-button">Fetch User Info</button>
    <br><br>
    <text id="user-info-container"></text>
    <br><br>
    <br><br>
    <h2>Send Waiting Message</h2>
    <input type="text" id="waiting-message-input" placeholder="Enter waiting message">
    <button id="send-waiting-message-button">Submit Waiting Message</button>
    <br><br>
    <text id="waiting-message-container"></text>
    <br><br>
    <script>
        console.log("Hello!");
    </script>
    <script type="module" src="dist/test.js"></script> 
</body>
</html>
